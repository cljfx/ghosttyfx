name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Validate and Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Cache Clojure deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-deps-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-deps-

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@02f5a82b79a547523e664fe8a7a32ea14884d7b2 # 13.6.0
        with:
          cli: latest

      - name: Run tests
        run: xvfb-run -a clojure -M:test

      - name: Check formatting
        run: clojure -M:fmt check

      - name: Release to Clojars
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: clojure -T:build deploy :username '"${{ secrets.CLOJARS_USERNAME }}"' :token '"${{ secrets.CLOJARS_DEPLOY_TOKEN }}"'
